<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 250" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a6472"/>
    </marker>
  </defs>

  <!-- loop-back arc -->
  <path d="M741,70 C741,18 77,18 77,68" fill="none" stroke="#5a6472" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="409" y="14" text-anchor="middle" font-size="12.5" fill="#5a6472">kept adapters compose into the next round</text>

  <!-- stage boxes (y=70, h=72, w=138) -->
  <!-- 0 harness: interview -->
  <g>
    <rect x="8" y="70" width="138" height="72" rx="9" fill="#edf0f3" stroke="#718096" stroke-width="1.5"/>
    <text x="77" y="100" text-anchor="middle" font-size="13.5" font-weight="600" fill="#3a4250">Interview</text>
    <text x="77" y="119" text-anchor="middle" font-size="13.5" font-weight="600" fill="#3a4250">the student</text>
  </g>
  <!-- 1 teacher: pick lesson + axis -->
  <g>
    <rect x="174" y="70" width="138" height="72" rx="9" fill="#e3effb" stroke="#2b6cb0" stroke-width="1.5"/>
    <text x="243" y="100" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1a4a7a">Teacher picks</text>
    <text x="243" y="119" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1a4a7a">a lesson</text>
  </g>
  <!-- 2 student: write poles -->
  <g>
    <rect x="340" y="70" width="138" height="72" rx="9" fill="#e6f5ec" stroke="#2f855a" stroke-width="1.5"/>
    <text x="409" y="100" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1f5a3f">Student writes a</text>
    <text x="409" y="119" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f5a3f">good and bad answer</text>
  </g>
  <!-- 3 harness: train + calibrate -->
  <g>
    <rect x="506" y="70" width="138" height="72" rx="9" fill="#edf0f3" stroke="#718096" stroke-width="1.5"/>
    <text x="575" y="100" text-anchor="middle" font-size="13.5" font-weight="600" fill="#3a4250">Train + calibrate</text>
    <text x="575" y="119" text-anchor="middle" font-size="13.5" font-weight="600" fill="#3a4250">steering adapter</text>
  </g>
  <!-- 4 teacher: keep / drop -->
  <g>
    <rect x="672" y="70" width="138" height="72" rx="9" fill="#e3effb" stroke="#2b6cb0" stroke-width="1.5"/>
    <text x="741" y="100" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1a4a7a">Teacher passes</text>
    <text x="741" y="119" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1a4a7a">or fails the course</text>
  </g>

  <!-- between-stage arrows (y=106) -->
  <line x1="148" y1="106" x2="172" y2="106" stroke="#5a6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="314" y1="106" x2="338" y2="106" stroke="#5a6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="106" x2="504" y2="106" stroke="#5a6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="646" y1="106" x2="670" y2="106" stroke="#5a6472" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- legend -->
  <g font-size="12.5">
    <rect x="270" y="196" width="14" height="14" rx="3" fill="#e3effb" stroke="#2b6cb0" stroke-width="1.5"/>
    <text x="290" y="207" fill="#3a4250">weak teacher (9B)</text>
    <rect x="404" y="196" width="14" height="14" rx="3" fill="#e6f5ec" stroke="#2f855a" stroke-width="1.5"/>
    <text x="424" y="207" fill="#3a4250">strong student (27B)</text>
    <rect x="556" y="196" width="14" height="14" rx="3" fill="#edf0f3" stroke="#718096" stroke-width="1.5"/>
    <text x="576" y="207" fill="#3a4250">harness</text>
  </g>
</svg>
