<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="v" markerWidth="10" markerHeight="10" refX="7" refY="3.2" orient="auto">
      <path d="M0,0 L7,3.2 L0,6.4 Z" fill="#2a7f7f"/>
    </marker>
  </defs>

  <rect width="700" height="300" fill="#ffffff"/>

  <!-- title + subtitle (words integrated, kept out of the plot) -->
  <text x="44" y="30" font-size="16" fill="#1a1a1a">Weight steering: one adapter is one line through c = 0</text>
  <text x="44" y="50" font-size="12.5" fill="#777">Two non-collinear targets can't both be hit, so v settles at the compromise.</text>
  <text x="44" y="66" font-size="12.5" fill="#777">The two end-pulls (dashed misses) conflict; PCGrad keeps only their agreeing part.</text>

  <!-- the adapter axis: the single learned line (the only "frame" in the figure) -->
  <line x1="95" y1="225" x2="640" y2="180" stroke="#2a7f7f" stroke-width="1.6"/>
  <!-- v: the learned direction, anchored at c=0 -->
  <line x1="330" y1="206" x2="538" y2="189" stroke="#2a7f7f" stroke-width="2.6" marker-end="url(#v)"/>
  <text x="450" y="214" font-size="13" fill="#2a7f7f" font-style="italic">v</text>

  <!-- c=0 anchor -->
  <circle cx="330" cy="206" r="4.5" fill="#1a1a1a"/>
  <text x="330" y="228" font-size="12.5" fill="#333" text-anchor="middle">c = 0  (base, no-op)</text>

  <!-- where the adapter actually lands at +-C -->
  <circle cx="560" cy="187" r="3.6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.3"/>
  <text x="566" y="203" font-size="11.5" fill="#555">+C&#183;v</text>
  <circle cx="100" cy="225" r="3.6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.3"/>
  <text x="100" y="243" font-size="11.5" fill="#555" text-anchor="middle">-C&#183;v</text>

  <!-- targets, direct-labeled -->
  <circle cx="585" cy="128" r="5" fill="#1a1a1a"/>
  <text x="596" y="125" font-size="13" fill="#1a1a1a">cho</text>
  <text x="596" y="140" font-size="11" fill="#888">+C target</text>
  <circle cx="130" cy="128" r="5" fill="#1a1a1a"/>
  <text x="119" y="125" font-size="13" fill="#1a1a1a" text-anchor="end">rej</text>
  <text x="119" y="140" font-size="11" fill="#888" text-anchor="end">-C target</text>

  <!-- residual misses = the two end-pulls PCGrad reconciles -->
  <line x1="560" y1="187" x2="583" y2="133" stroke="#999" stroke-width="1.3" stroke-dasharray="3 3"/>
  <line x1="100" y1="225" x2="128" y2="133" stroke="#999" stroke-width="1.3" stroke-dasharray="3 3"/>
  <text x="600" y="170" font-size="11" fill="#999" font-style="italic">miss</text>
  <text x="78" y="180" font-size="11" fill="#999" font-style="italic" text-anchor="end">miss</text>
</svg>
