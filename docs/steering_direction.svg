<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" font-family="sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="ahg" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#1a9a5a"/>
    </marker>
    <marker id="ahr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#cc3333"/>
    </marker>
  </defs>

  <rect width="720" height="640" fill="#ffffff"/>

  <!-- ================= Panel A: compromise line ================= -->
  <text x="40" y="32" font-size="16" font-weight="bold" fill="#111">A. The line must pass through c=0 - so it hits neither cho nor rej</text>

  <!-- faint "ideal" rays: to hit each target the line would need a different direction -->
  <line x1="330" y1="200" x2="565" y2="112" stroke="#bbb" stroke-width="1.3" stroke-dasharray="4 4"/>
  <line x1="330" y1="200" x2="120" y2="150" stroke="#bbb" stroke-width="1.3" stroke-dasharray="4 4"/>
  <text x="470" y="92" font-size="11.5" fill="#999" text-anchor="middle">to hit cho, v would point here</text>
  <text x="150" y="128" font-size="11.5" fill="#999" text-anchor="middle">to hit rej, here</text>

  <!-- the actual learned line (through c=0), leaning toward the harder pull -->
  <line x1="145" y1="250" x2="515" y2="150" stroke="#1a9a5a" stroke-width="3.5" opacity="0.9"/>
  <line x1="330" y1="200" x2="508" y2="152" stroke="#1a9a5a" stroke-width="4" marker-end="url(#ahg)" opacity="0.95"/>
  <text x="445" y="205" font-size="13.5" fill="#1a9a5a" font-weight="bold">v: compromise line</text>

  <!-- c=0 / base -->
  <circle cx="330" cy="200" r="6.5" fill="#1a9a5a"/>
  <text x="330" y="228" font-size="13.5" fill="#1a9a5a" text-anchor="middle" font-weight="bold">c = 0  (base &#8776; rej)</text>

  <!-- +C and -C points ON the line -->
  <circle cx="515" cy="150" r="5" fill="none" stroke="#333" stroke-width="1.4"/>
  <text x="515" y="140" font-size="12" fill="#333" text-anchor="middle">+C&#183;v</text>
  <circle cx="145" cy="250" r="5" fill="none" stroke="#333" stroke-width="1.4"/>
  <text x="145" y="270" font-size="12" fill="#333" text-anchor="middle">-C&#183;v</text>

  <!-- targets -->
  <circle cx="565" cy="112" r="6" fill="#cc3333"/>
  <text x="577" y="108" font-size="13.5" fill="#cc3333" font-weight="bold">cho</text>
  <text x="577" y="124" font-size="11" fill="#888">+C target, nll&#8776;3</text>
  <circle cx="120" cy="150" r="6" fill="#3366cc"/>
  <text x="108" y="146" font-size="13.5" fill="#3366cc" font-weight="bold" text-anchor="end">rej</text>
  <text x="112" y="162" font-size="11" fill="#888" text-anchor="end">-C target</text>

  <!-- residual misses -->
  <line x1="515" y1="150" x2="558" y2="118" stroke="#cc3333" stroke-width="1.6" stroke-dasharray="3 3"/>
  <text x="548" y="150" font-size="11" fill="#cc3333">miss</text>
  <line x1="145" y1="250" x2="124" y2="158" stroke="#3366cc" stroke-width="1.6" stroke-dasharray="3 3"/>
  <text x="150" y="200" font-size="11" fill="#3366cc">miss</text>

  <!-- note -->
  <text x="40" y="312" font-size="12.5" fill="#444">cho and rej are not collinear with base, so no single line through c=0 reaches both. v settles at the</text>
  <text x="40" y="330" font-size="12.5" fill="#444">weighted compromise - leaning toward the pole that pulls harder. Panel B: which pole that is.</text>

  <line x1="40" y1="352" x2="680" y2="352" stroke="#ddd" stroke-width="1"/>

  <!-- ================= Panel B: gradient saturation ================= -->
  <text x="40" y="386" font-size="16" font-weight="bold" fill="#111">B. Which pole pulls harder? The bounded gradient, not the loss value</text>

  <!-- axes -->
  <line x1="120" y1="580" x2="660" y2="580" stroke="#333" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="120" y1="580" x2="120" y2="410" stroke="#333" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="636" y="600" font-size="13" fill="#333">nll (loss value)</text>
  <text x="96" y="420" font-size="13" fill="#333" text-anchor="end">|grad|</text>
  <text x="96" y="435" font-size="13" fill="#333" text-anchor="end">= 1-p</text>

  <!-- ceiling -->
  <line x1="120" y1="438" x2="660" y2="438" stroke="#999" stroke-dasharray="5 4" stroke-width="1.2"/>
  <text x="655" y="432" font-size="12" fill="#777" text-anchor="end">ceiling = 1: pull self-limits, no norm needed</text>

  <!-- x ticks -->
  <text x="120" y="597" font-size="11" fill="#777" text-anchor="middle">0</text>
  <text x="380" y="597" font-size="11" fill="#777" text-anchor="middle">3</text>
  <text x="553" y="597" font-size="11" fill="#777" text-anchor="middle">5</text>

  <!-- curve g = 1 - e^-nll -->
  <path d="M120,580 L163,524 L207,490 L250,470 L293,457 L380,445 L467,441 L553,439 L640,438"
        fill="none" stroke="#222" stroke-width="2.5"/>

  <!-- rej point -->
  <circle cx="163" cy="524" r="6" fill="#3366cc"/>
  <text x="173" y="520" font-size="12.5" fill="#3366cc">rej: nll 0.5 -&gt; |grad| 0.39 (weak brake)</text>

  <!-- cho point -->
  <circle cx="380" cy="445" r="6" fill="#cc3333"/>
  <text x="392" y="442" font-size="12.5" fill="#cc3333">cho: nll 3 -&gt; |grad| 0.95 (strong driver, saturating)</text>

  <!-- push runaway -->
  <line x1="600" y1="439" x2="600" y2="412" stroke="#cc3333" stroke-width="2.5" marker-end="url(#ahr)"/>
  <text x="610" y="424" font-size="11.5" fill="#cc3333">push: no ceiling</text>
  <text x="610" y="438" font-size="11.5" fill="#cc3333">-&gt; the one cap</text>

  <!-- takeaway -->
  <text x="120" y="622" font-size="12.5" fill="#444">A big nll <tspan font-style="italic">value</tspan> is not a big nll <tspan font-style="italic">gradient</tspan>: the line leans toward cho because its pull saturates near 1, while rej's &#8776; 0.</text>
</svg>
